:root{--bg:#F5F5F7;--surface:#FFFFFF;--text-1:#1C1C1E;--text-2:#3A3A3C;--text-3:#8E8E93;--border:rgba(0,0,0,0.06);--font:-apple-system,BlinkMacSystemFont,'SF Pro Text','PingFang SC',sans-serif;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;-webkit-font-smoothing:antialiased;}

.back-btn:hover{background:rgba(118,118,128,0.18);}
.topbar-title{font-size:15px;font-weight:600;color:var(--text-1);}
.hero{padding:48px 0 36px;text-align:center;}
.hero-icon{font-size:52px;margin-bottom:16px;}
.hero-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600;letter-spacing:0.04em;margin-bottom:12px;background:#5AC8FA14;color:#5AC8FA;}
.hero-title{font-size:30px;font-weight:700;letter-spacing:-0.03em;margin-bottom:8px;}
.hero-sub{font-size:15px;color:var(--text-3);}
.content{max-width:640px;margin:0 auto;padding:0 24px 80px;}
.section-label{font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-3);margin-bottom:12px;padding-top:8px;}
.chapter-list{display:flex;flex-direction:column;gap:6px;margin-bottom:32px;}
.chapter-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border-radius:14px;text-decoration:none;color:var(--text-1);border:1px solid var(--border);transition:all 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.03);}
.chapter-item:hover{border-color:#5AC8FA40;box-shadow:0 4px 16px rgba(0,0,0,0.07);transform:translateY(-1px);}
.chapter-item.proj{background:linear-gradient(135deg,#5AC8FA08 0%,rgba(175,82,222,0.04) 100%);border-color:#5AC8FA20;}
.ci-num{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.ci-info{flex:1;min-width:0;}
.ci-title{font-size:14px;font-weight:600;color:var(--text-1);margin-bottom:2px;}
.ci-desc{font-size:12px;color:var(--text-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ci-arrow{color:rgba(0,0,0,0.2);flex-shrink:0;}
.chapter-item:hover .ci-arrow{color:#5AC8FA;}
